<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOINT ENTRANCE EXAMINATION (Main) - 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-left">
            <img src="f.jpg" alt="Govenment of India,Ministry of Education" class="header-left-image">
        </div>
        
        <div class="header-center">
            <h1>JOINT ENTRANCE EXAMINATION (Main) – 2026 SESSION 2</h1>
            <h2>NTA SCORE: Paper 1 (B.E./B. Tech.)</h2>
        </div>

        <div class="header-right">
            <img src="t.avif">
                </div>
    </header>

    <div class="content-container">
        <div class="view-result-box">
            <div class="box-header">
                <span class="lock-icon">&#128274;</span> View Result
            </div>
            <div class="box-body">
                <form id="captchaForm">
                    <div class="form-row">
                        <label for="captchaInput">
                            Enter CAPTCHA <br>
                            <span class="case-sensitive">(case sensitive) :</span>
                        </label>
                        <div class="input-container">
                            <input type="text" id="captchaInput" autocomplete="off" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>CAPTCHA :</label>
                        <div class="captcha-display-area">
                            <div id="captchaValue" class="captcha-badge">b1cDqQ</div>
                            <button type="button" id="refreshBtn" class="refresh-icon" title="Refresh CAPTCHA">&#10227;</button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="submit-button">SUBMIT</button>
                    </div>
                </form>
                <p id="errorMessage" class="error-text"></p>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        This site is designed and hosted by NIC PEP Division. The contents are provided by NTA. For any further information, please contact NTA.
    </footer>

    <script src="script.js"></script>
</body>
</html>
